<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel3D — Modelador Voxel · Clube de Código</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0e27;
            --bg2: #0f1530;
            --panel: rgba(10, 18, 45, 0.97);
            --accent: #00ff88;
            --accent2: #ff004d;
            --accent3: #29adff;
            --text: #e0e7ff;
            --muted: #6b7a99;
            --border: rgba(0,255,136,0.22);
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        #viewport { position: fixed; inset: 0; }

        /* ── SIDEBAR ── */
        #sidebar {
            position: fixed;
            top: 0; right: 0;
            width: 340px;
            height: 100vh;
            background: var(--panel);
            border-left: 2px solid var(--border);
            overflow-y: auto;
            padding: 18px 16px 32px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            transition: transform 0.28s ease;
            z-index: 20;
            backdrop-filter: blur(12px);
        }
        #sidebar.hidden { transform: translateX(100%); }

        #sidebar::-webkit-scrollbar { width: 6px; }
        #sidebar::-webkit-scrollbar-track { background: transparent; }
        #sidebar::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; opacity: 0.5; }

        /* toggle */
        #toggle-sidebar {
            position: fixed;
            top: 18px; right: 354px;
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 8px 12px;
            border-radius: 6px 0 0 6px;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            z-index: 25;
            transition: right 0.28s ease;
            letter-spacing: 0.04em;
        }
        #toggle-sidebar.moved { right: 14px; }

        /* Section headers */
        .section-title {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent);
            border-bottom: 1px solid var(--border);
            padding-bottom: 6px;
        }

        /* App title */
        .app-title {
            text-align: center;
            padding: 4px 0 2px;
        }
        .app-title h1 {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 0.06em;
            color: var(--accent);
            text-shadow: 0 0 16px rgba(0,255,136,0.45);
        }
        .app-title p {
            font-size: 10px;
            color: var(--muted);
            margin-top: 2px;
            letter-spacing: 0.08em;
        }

        /* Stats bar */
        .stats {
            display: flex;
            gap: 8px;
        }
        .stat-box {
            flex: 1;
            background: rgba(0,255,136,0.06);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px;
            text-align: center;
        }
        .stat-box .val {
            font-size: 20px;
            font-weight: 800;
            color: var(--accent);
            line-height: 1;
        }
        .stat-box .lbl {
            font-size: 9px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-top: 3px;
        }

        /* Mode buttons */
        .mode-btns {
            display: flex;
            gap: 8px;
        }
        .mode-btn {
            flex: 1;
            padding: 9px 6px;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: transparent;
            color: var(--text);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.18s;
            letter-spacing: 0.04em;
        }
        .mode-btn:hover { border-color: var(--accent); color: var(--accent); }
        .mode-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); box-shadow: 0 0 12px rgba(0,255,136,0.3); }
        .mode-btn#btn-erase.active { background: var(--accent2); border-color: var(--accent2); box-shadow: 0 0 12px rgba(255,0,77,0.3); }

        /* Palette */
        #palette {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 5px;
        }
        .palette-btn {
            aspect-ratio: 1;
            border-radius: 5px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: transform 0.12s, border-color 0.12s;
        }
        .palette-btn:hover { transform: scale(1.18); border-color: rgba(255,255,255,0.5); }
        .palette-btn.active { border-color: white; transform: scale(1.15); box-shadow: 0 0 8px rgba(255,255,255,0.4); }

        /* Layer control */
        .layer-ctrl {
            background: rgba(0,255,136,0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
        }
        .layer-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .layer-display {
            font-size: 28px;
            font-weight: 800;
            color: var(--accent);
            font-variant-numeric: tabular-nums;
            min-width: 38px;
            text-align: center;
            text-shadow: 0 0 14px rgba(0,255,136,0.5);
        }
        .layer-label { font-size: 11px; color: var(--muted); }
        .layer-arrows { display: flex; flex-direction: column; gap: 3px; }
        .layer-arrows button {
            background: var(--border);
            border: none;
            border-radius: 4px;
            color: var(--accent);
            width: 26px;
            height: 22px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.15s;
        }
        .layer-arrows button:hover { background: rgba(0,255,136,0.25); }
        input[type="range"] {
            width: 100%;
            accent-color: var(--accent);
            cursor: pointer;
        }

        /* Templates */
        .template-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }
        .tpl-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 4px;
            color: var(--text);
            font-size: 11px;
            cursor: pointer;
            text-align: center;
            transition: all 0.16s;
            line-height: 1.4;
        }
        .tpl-btn:hover { border-color: var(--accent3); background: rgba(41,173,255,0.08); }
        .tpl-btn .emoji { font-size: 18px; display: block; }

        /* Rotation */
        .rot-btns { display: flex; gap: 8px; }
        .rot-btn {
            flex: 1; padding: 8px; border: 1px solid var(--border);
            border-radius: 8px; background: transparent; color: var(--text);
            font-size: 11px; cursor: pointer; transition: all 0.15s;
        }
        .rot-btn:hover { border-color: var(--accent3); background: rgba(41,173,255,0.08); }

        /* Export buttons */
        .export-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 7px;
        }
        .exp-btn {
            padding: 10px 6px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.16s;
            text-align: center;
        }
        .exp-btn:hover { background: rgba(0,255,136,0.08); border-color: var(--accent); color: var(--accent); }
        .exp-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .exp-btn.primary {
            grid-column: span 2;
            background: rgba(0,255,136,0.1);
            border-color: var(--accent);
            color: var(--accent);
        }
        .exp-btn.primary:hover { background: rgba(0,255,136,0.2); }

        /* Danger */
        .btn-danger {
            width: 100%;
            padding: 9px;
            border-radius: 8px;
            border: 1px solid rgba(255,0,77,0.35);
            background: transparent;
            color: var(--accent2);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn-danger:hover { background: rgba(255,0,77,0.12); }

        /* ── BRAND — canto superior esquerdo (estilo Code3D) ── */
        #brand {
            position: fixed;
            top: 18px; left: 20px;
            z-index: 30;
            pointer-events: none;
        }
        #brand h1 {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 0.08em;
            color: var(--accent);
            text-shadow: 0 0 18px rgba(0,255,136,0.5);
            line-height: 1;
        }
        #brand p {
            font-size: 9px;
            color: var(--muted);
            letter-spacing: 0.10em;
            margin-top: 3px;
            text-transform: uppercase;
        }
            position: fixed;
            bottom: 20px; left: 20px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 11px;
            line-height: 1.9;
            color: var(--muted);
            backdrop-filter: blur(8px);
            pointer-events: none;
        }
        #info strong { color: var(--accent); }

        /* Message toast */
        .message {
            position: fixed;
            top: 20px; left: 50%;
            transform: translateX(-50%) translateY(-12px);
            background: var(--accent);
            color: var(--bg);
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 13px;
            opacity: 0;
            pointer-events: none;
            z-index: 999;
            transition: opacity 0.2s, transform 0.2s;
        }
        .message.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .message.error { background: var(--accent2); color: white; }
    </style>
</head>
<body>

<div id="viewport"></div>

<div id="brand">
    <h1>🧱 PIXEL3D</h1>
    <p>Clube de Código · CICF</p>
</div>

<button id="toggle-sidebar" onclick="toggleSidebar()">◀ Painel</button>

<div id="sidebar">
    <div class="stats">
        <div class="stat-box">
            <div class="val" id="stat-blocks">0</div>
            <div class="lbl">Blocos</div>
        </div>
        <div class="stat-box">
            <div class="val" id="stat-colors">0</div>
            <div class="lbl">Cores</div>
        </div>
        <div class="stat-box">
            <div class="val" id="layer-display">0</div>
            <div class="lbl">Camada</div>
        </div>
    </div>

    <!-- Mode -->
    <div>
        <div class="section-title" style="margin-bottom:8px">Modo</div>
        <div class="mode-btns">
            <button id="btn-add" class="mode-btn active" onclick="setMode('add')">🧱 Adicionar</button>
            <button id="btn-erase" class="mode-btn" onclick="setMode('erase')">🗑️ Apagar</button>
        </div>
    </div>

    <!-- Palette -->
    <div>
        <div class="section-title" style="margin-bottom:8px">Paleta PICO-8</div>
        <div id="palette"></div>
    </div>

    <!-- Layer -->
    <div class="layer-ctrl">
        <div class="section-title" style="margin-bottom:10px">Camada (Y)</div>
        <div class="layer-row">
            <div class="layer-display" id="layer-display-2"></div>
            <div class="layer-label">Clica nesta<br>altura para<br>construir</div>
            <div class="layer-arrows">
                <button onclick="atualizarCamada(currentLayer+1)">▲</button>
                <button onclick="atualizarCamada(currentLayer-1)">▼</button>
            </div>
        </div>
        <input type="range" id="layer-slider" min="0" max="15" value="0">
    </div>

    <!-- Templates -->
    <div>
        <div class="section-title" style="margin-bottom:8px">Templates</div>
        <div class="template-grid">
            <button class="tpl-btn" onclick="carregarTemplate('humanoid')"><span class="emoji">🤖</span>Humanóide</button>
            <button class="tpl-btn" onclick="carregarTemplate('animal')"><span class="emoji">🐾</span>Animal</button>
            <button class="tpl-btn" onclick="carregarTemplate('foguetao')"><span class="emoji">🚀</span>Foguetão</button>
            <button class="tpl-btn" onclick="carregarTemplate('arvore')"><span class="emoji">🌲</span>Árvore</button>
            <button class="tpl-btn" onclick="carregarTemplate('casa')"><span class="emoji">🏠</span>Casa</button>
            <button class="tpl-btn" onclick="carregarTemplate('vazio')"><span class="emoji">⬜</span>Vazio</button>
        </div>
    </div>

    <!-- Camera / Rotation -->
    <div>
        <div class="section-title" style="margin-bottom:8px">Câmera</div>
        <div class="rot-btns">
            <button class="rot-btn" onclick="animando=true">▶ Rodar</button>
            <button class="rot-btn" onclick="animando=false">⏸ Parar</button>
            <button class="rot-btn" onclick="resetarCamera()">🎥 Reset</button>
        </div>
        <button class="rot-btn" style="width:100%;margin-top:6px" onclick="centrarPivot()" title="Move o ponto de pivot (⬤ amarelo) para o centro do modelo">🎯 Centrar Pivot no Modelo</button>
    </div>

    <!-- Export -->
    <div>
        <div class="section-title" style="margin-bottom:8px">Exportar</div>
        <div class="export-grid">
            <button id="btn-gif" class="exp-btn primary" onclick="exportarGIF()">🎞️ GIF Animado</button>
            <button class="exp-btn" onclick="exportarPNG()">📸 PNG</button>
            <button class="exp-btn" onclick="exportarTXT()">📄 Camadas TXT</button>
        </div>
    </div>

    <!-- Clear -->
    <button class="btn-danger" onclick="if(confirm('Apagar tudo?')) limparTudo()">🗑️ Limpar tudo</button>
</div>

<div id="info">
    <strong>🖱 Esq:</strong> Adicionar / Apagar bloco<br>
    <strong>🖱 Dir:</strong> Pan (move pivot ⬤)<br>
    <strong>⚙️ Scroll:</strong> Zoom<br>
    <strong>⌨ ↑↓:</strong> Mudar camada<br>
    <strong>⬤ Amarelo:</strong> Ponto de pivot
</div>

<div id="message" class="message"></div>

<script>
    // Atalhos de teclado para camada
    document.addEventListener('keydown', e => {
        if (e.key === 'ArrowUp' || e.key === 'PageUp') { e.preventDefault(); atualizarCamada(currentLayer + 1); }
        if (e.key === 'ArrowDown' || e.key === 'PageDown') { e.preventDefault(); atualizarCamada(currentLayer - 1); }
        if (e.key === 'a' || e.key === 'A') setMode('add');
        if (e.key === 'e' || e.key === 'E') setMode('erase');
    });
    // Sync layer display duplicado
    const ld2 = document.getElementById('layer-display-2');
    const ld1 = document.getElementById('layer-display');
    setInterval(() => { if (ld2) ld2.textContent = ld1.textContent; }, 200);
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="app.js"></script>
</body>
</html>
