<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel3D — Galeria</title>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg-gallery: #f0ece4;
  --ui-bg:    #0a0e27;
  --ui-panel: rgba(10,14,39,0.97);
  --accent:   #00ff88;
  --accent2:  #ff004d;
  --text:     #e0e7ff;
  --muted:    #5a6880;
  --border:   rgba(0,255,136,0.2);
}

body {
  font-family: 'Segoe UI', Tahoma, sans-serif;
  background: var(--ui-bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ─────────────────────────────────────────────────── */
header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 10px 20px;
  background: var(--ui-panel);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
  z-index: 50;
  flex-wrap: wrap;
}

.brand { display:flex; align-items:center; gap:10px; flex-shrink:0; }
.brand-name {
  font-size: 17px; font-weight: 800; letter-spacing:.07em;
  color: var(--accent); text-shadow: 0 0 12px rgba(0,255,136,.4);
  line-height:1;
}
.brand-sub { font-size: 8px; color: var(--muted); letter-spacing:.1em; text-transform:uppercase; margin-top:2px; }

.header-sep { width:1px; height:28px; background: var(--border); flex-shrink:0; }

/* ── Controls ───────────────────────────────────────────────── */
.controls { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }

.ctrl-label {
  font-size: 10px; letter-spacing:.1em; text-transform:uppercase;
  color: var(--muted); white-space:nowrap;
}

/* Load button */
.load-btn {
  display: flex; align-items:center; gap:6px;
  padding: 7px 14px; border-radius:7px;
  border: 1px solid var(--border); background: rgba(0,255,136,.08);
  color: var(--accent); font-size:11px; font-weight:700;
  cursor:pointer; transition:.15s; white-space:nowrap;
  letter-spacing:.04em;
}
.load-btn:hover { background: rgba(0,255,136,.18); border-color: var(--accent); }

/* Color picker group */
.color-group {
  display:flex; align-items:center; gap:8px;
  background: rgba(255,255,255,.04);
  border: 1px solid var(--border); border-radius:7px;
  padding: 5px 10px;
}
#bg-picker {
  width: 26px; height: 26px;
  border: none; border-radius:5px; cursor:pointer;
  background: none; padding:0;
}
#bg-picker::-webkit-color-swatch-wrapper { padding:0; border-radius:5px; }
#bg-picker::-webkit-color-swatch { border:none; border-radius:5px; }

/* Preset swatches */
.presets { display:flex; gap:5px; }
.swatch {
  width:20px; height:20px; border-radius:4px; cursor:pointer;
  border: 2px solid transparent; transition:.12s; flex-shrink:0;
}
.swatch:hover, .swatch.active { border-color: var(--accent); transform:scale(1.15); }

/* Count badge */
.count-badge {
  margin-left: auto;
  font-size: 10px; color: var(--muted);
  background: rgba(255,255,255,.05); border: 1px solid var(--border);
  border-radius:20px; padding: 3px 10px; white-space:nowrap;
}
.count-badge strong { color: var(--accent); }

/* ── Drop overlay (initial state) ───────────────────────────── */
#drop-state {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:18px;
  cursor:pointer;
  transition: background .2s;
}
#drop-state.drag-over { background: rgba(0,255,136,.04); }
#drop-state .drop-icon {
  font-size:52px;
  animation: floatY 3s ease-in-out infinite;
  filter: drop-shadow(0 0 18px rgba(0,255,136,.3));
}
@keyframes floatY { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
#drop-state h2 {
  font-size:20px; font-weight:700; color:var(--accent);
  text-shadow:0 0 18px rgba(0,255,136,.3);
}
#drop-state p { font-size:12px; color:var(--muted); }
.drop-hint {
  display:flex; align-items:center; gap:8px;
  font-size:10px; color:var(--muted);
  border:1px dashed rgba(0,255,136,.28); border-radius:7px; padding:7px 16px;
}

/* ── Gallery area ───────────────────────────────────────────── */
#gallery-wrap {
  display: none;
  flex: 1;
  overflow: auto;
  background: var(--bg-gallery);
  transition: background .25s;
}

#gallery {
  display: flex;
  flex-wrap: wrap;
  align-items: flex-start;
  /* No gap — GIFs tile edge-to-edge */
}

.gif-item {
  position: relative;
  cursor: pointer;
  overflow: hidden;
  /* size set by JS */
}
.gif-item img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: contain;
  image-rendering: pixelated;
}
.gif-item .gif-label {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 4px 6px;
  font-size: 9px;
  color: #333;
  background: rgba(255,255,255,.55);
  backdrop-filter: blur(4px);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  opacity: 0; transition: opacity .15s;
  font-family: 'Segoe UI', sans-serif;
}
.gif-item:hover .gif-label { opacity: 1; }

/* ── Lightbox ───────────────────────────────────────────────── */
#lightbox {
  display: none;
  position: fixed; inset:0; z-index: 200;
  background: rgba(0,0,0,.82);
  backdrop-filter: blur(10px);
  align-items: center; justify-content: center;
  flex-direction: column; gap: 14px;
}
#lightbox.open { display:flex; }
#lightbox img {
  max-width: 80vw; max-height: 80vh;
  image-rendering: pixelated;
  border-radius: 6px;
  box-shadow: 0 0 60px rgba(0,0,0,.6);
  background: var(--bg-gallery);
}
#lb-name {
  font-size:12px; color: var(--muted); letter-spacing:.05em;
}
#lightbox .lb-close {
  position:absolute; top:20px; right:24px;
  font-size:28px; color: var(--muted); cursor:pointer;
  transition:.15s; background:none; border:none; line-height:1;
}
#lightbox .lb-close:hover { color: var(--accent); }
#lightbox .lb-nav {
  position:absolute; top:50%; transform:translateY(-50%);
  font-size:36px; color: rgba(255,255,255,.5); cursor:pointer;
  background:none; border:none; transition:.15s; padding:0 16px;
  user-select:none;
}
#lightbox .lb-nav:hover { color: var(--accent); }
#lb-prev { left:0; }
#lb-next { right:0; }

/* File input hidden */
#folder-input { display:none; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <span style="font-size:18px">🧱</span>
    <div>
      <div class="brand-name">PIXEL3D</div>
      <div class="brand-sub">Galeria · v2.1</div>
    </div>
  </div>

  <div class="header-sep"></div>

  <div class="controls">
    <button class="load-btn" onclick="document.getElementById('folder-input').click()">
      📂 Carregar pasta de GIFs
    </button>

    <div class="header-sep"></div>

    <div class="color-group">
      <span class="ctrl-label">Fundo</span>
      <input type="color" id="bg-picker" value="#f0ece4" oninput="setBG(this.value)">
      <div class="presets">
        <div class="swatch active" style="background:#f0ece4" title="Areia"       onclick="setSwatch(this,'#f0ece4')"></div>
        <div class="swatch"        style="background:#ffffff" title="Branco"      onclick="setSwatch(this,'#ffffff')"></div>
        <div class="swatch"        style="background:#f5f5f5" title="Cinza claro" onclick="setSwatch(this,'#f5f5f5')"></div>
        <div class="swatch"        style="background:#e8f4ec" title="Verde pálido" onclick="setSwatch(this,'#e8f4ec')"></div>
        <div class="swatch"        style="background:#eaf0fb" title="Azul pálido" onclick="setSwatch(this,'#eaf0fb')"></div>
        <div class="swatch"        style="background:#1a1a2e" title="Escuro"       onclick="setSwatch(this,'#1a1a2e')"></div>
      </div>
    </div>

    <div class="header-sep"></div>

    <span class="ctrl-label">Tamanho</span>
    <input type="range" id="size-slider" min="80" max="400" value="200"
           style="width:90px;accent-color:var(--accent);cursor:pointer"
           oninput="setTileSize(this.value)">
  </div>

  <div class="count-badge" id="count-badge" style="display:none">
    <strong id="count-num">0</strong> GIFs
  </div>
</header>

<!-- Drop state -->
<div id="drop-state">
  <div class="drop-icon">🎞️</div>
  <h2>Seleciona a pasta com os GIFs</h2>
  <p>Todos os ficheiros .gif são carregados automaticamente</p>
  <div class="drop-hint">
    Exporta do Pixel3D → <strong style="color:var(--accent);margin:0 4px">🎞️ GIF</strong> → guarda numa pasta → carrega aqui
  </div>
</div>

<!-- Gallery -->
<div id="gallery-wrap">
  <div id="gallery"></div>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <button class="lb-close" onclick="closeLB()">✕</button>
  <button class="lb-nav" id="lb-prev" onclick="navLB(-1)">‹</button>
  <img id="lb-img" src="" alt="">
  <div id="lb-name"></div>
  <button class="lb-nav" id="lb-next" onclick="navLB(+1)">›</button>
</div>

<input type="file" id="folder-input" webkitdirectory multiple accept=".gif,image/gif">

<script>
let gifs = [];          // { name, url }
let tileSize = 200;
let lbIdx = 0;

// ── Folder input ──────────────────────────────────────────────
document.getElementById('folder-input').addEventListener('change', e => {
    const files = [...e.target.files]
        .filter(f => f.name.toLowerCase().endsWith('.gif'))
        .sort((a, b) => a.name.localeCompare(b.name));

    if (!files.length) {
        alert('Nenhum ficheiro .gif encontrado na pasta selecionada.');
        return;
    }

    // Revogar URLs anteriores
    gifs.forEach(g => URL.revokeObjectURL(g.url));
    gifs = files.map(f => ({ name: f.name, url: URL.createObjectURL(f) }));
    renderGallery();
});

// ── Render gallery ─────────────────────────────────────────────
function renderGallery() {
    const wrap    = document.getElementById('gallery-wrap');
    const gallery = document.getElementById('gallery');
    const drop    = document.getElementById('drop-state');
    const badge   = document.getElementById('count-badge');

    gallery.innerHTML = '';

    gifs.forEach((g, i) => {
        const item = document.createElement('div');
        item.className = 'gif-item';
        item.style.width  = tileSize + 'px';
        item.style.height = tileSize + 'px';

        const img = document.createElement('img');
        img.src = g.url;
        img.alt = g.name;
        img.loading = 'lazy';

        const label = document.createElement('div');
        label.className = 'gif-label';
        label.textContent = g.name.replace(/\.gif$/i, '').replace(/pixel3d_/i, '');

        item.appendChild(img);
        item.appendChild(label);
        item.addEventListener('click', () => openLB(i));
        gallery.appendChild(item);
    });

    drop.style.display = 'none';
    wrap.style.display = 'block';
    badge.style.display = '';
    document.getElementById('count-num').textContent = gifs.length;
}

// ── Tile size ──────────────────────────────────────────────────
function setTileSize(v) {
    tileSize = parseInt(v);
    document.querySelectorAll('.gif-item').forEach(el => {
        el.style.width  = tileSize + 'px';
        el.style.height = tileSize + 'px';
    });
}

// ── Background colour ──────────────────────────────────────────
function setBG(hex) {
    document.getElementById('gallery-wrap').style.background = hex;
    document.getElementById('bg-picker').value = hex;
    // Update swatch active state
    document.querySelectorAll('.swatch').forEach(s => {
        s.classList.toggle('active', s.style.background === hexToRgbStr(hex) || s.title && swatchHex(s) === hex.toLowerCase());
    });
}

function setSwatch(el, hex) {
    setBG(hex);
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    el.classList.add('active');
}

function swatchHex(el) {
    // Read the swatch color from its onclick attribute
    const m = el.getAttribute('onclick').match(/'(#[0-9a-f]+)'/i);
    return m ? m[1].toLowerCase() : '';
}

function hexToRgbStr(hex) {
    // Convert #rrggbb to "rgb(r, g, b)" for comparison with computed styles
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgb(${r}, ${g}, ${b})`;
}

// ── Lightbox ───────────────────────────────────────────────────
function openLB(i) {
    lbIdx = i;
    updateLB();
    document.getElementById('lightbox').classList.add('open');
}

function updateLB() {
    const g = gifs[lbIdx];
    document.getElementById('lb-img').src  = g.url;
    document.getElementById('lb-name').textContent = g.name.replace(/pixel3d_/i,'');
    document.getElementById('lb-prev').style.opacity = lbIdx === 0 ? '.2' : '1';
    document.getElementById('lb-next').style.opacity = lbIdx === gifs.length-1 ? '.2' : '1';
    // Apply gallery bg to lightbox image bg
    const bg = document.getElementById('gallery-wrap').style.background ||
               getComputedStyle(document.getElementById('gallery-wrap')).background;
    document.getElementById('lb-img').style.background = bg;
}

function closeLB() {
    document.getElementById('lightbox').classList.remove('open');
}

function navLB(dir) {
    lbIdx = Math.max(0, Math.min(gifs.length-1, lbIdx + dir));
    updateLB();
}

// Keyboard
document.addEventListener('keydown', e => {
    const lb = document.getElementById('lightbox');
    if (lb.classList.contains('open')) {
        if (e.key === 'ArrowLeft')  navLB(-1);
        if (e.key === 'ArrowRight') navLB(+1);
        if (e.key === 'Escape')     closeLB();
    }
});

// Click outside image in lightbox → close
document.getElementById('lightbox').addEventListener('click', e => {
    if (e.target === document.getElementById('lightbox')) closeLB();
});

// ── Init BG ───────────────────────────────────────────────────
document.getElementById('gallery-wrap').style.background = '#f0ece4';
</script>
</body>
</html>
