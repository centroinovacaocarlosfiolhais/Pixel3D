<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel3D — Galeria</title>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --ui-bg:   #0a0e27;
  --panel:   rgba(10,14,39,0.97);
  --accent:  #00ff88;
  --accent2: #ff004d;
  --text:    #e0e7ff;
  --muted:   #5a6880;
  --border:  rgba(0,255,136,0.2);
}

body {
  font-family: 'Segoe UI', Tahoma, sans-serif;
  background: var(--ui-bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ─────────────────────────────────────────────────── */
header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 9px 18px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  z-index: 50;
  flex-wrap: wrap;
}
.brand { display:flex; align-items:center; gap:9px; flex-shrink:0; }
.brand-name { font-size:16px; font-weight:800; letter-spacing:.07em; color:var(--accent); text-shadow:0 0 12px rgba(0,255,136,.4); line-height:1; }
.brand-sub  { font-size:8px; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; margin-top:2px; }
.sep { width:1px; height:26px; background:var(--border); flex-shrink:0; }

.hbtn {
  display:flex; align-items:center; gap:5px;
  padding:6px 13px; border-radius:7px; font-size:11px; font-weight:700;
  cursor:pointer; border:1px solid var(--border); background:rgba(0,255,136,.07);
  color:var(--accent); letter-spacing:.04em; transition:.15s; white-space:nowrap;
}
.hbtn:hover { background:rgba(0,255,136,.18); border-color:var(--accent); }
.hbtn.orange { color:#ffa300; border-color:rgba(255,163,0,.4); background:rgba(255,163,0,.07); }
.hbtn.orange:hover { background:rgba(255,163,0,.16); border-color:#ffa300; }

.color-group { display:flex; align-items:center; gap:7px; background:rgba(255,255,255,.04); border:1px solid var(--border); border-radius:7px; padding:4px 10px; }
.ctrl-label  { font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); white-space:nowrap; }
#bg-picker   { width:24px; height:24px; border:none; border-radius:4px; cursor:pointer; background:none; padding:0; }
#bg-picker::-webkit-color-swatch-wrapper { padding:0; border-radius:4px; }
#bg-picker::-webkit-color-swatch         { border:none; border-radius:4px; }
.presets { display:flex; gap:4px; }
.swatch  { width:18px; height:18px; border-radius:3px; cursor:pointer; border:2px solid transparent; transition:.12s; flex-shrink:0; }
.swatch:hover, .swatch.active { border-color:var(--accent); transform:scale(1.18); }

.size-group { display:flex; align-items:center; gap:7px; }
.count-badge { margin-left:auto; font-size:10px; color:var(--muted); background:rgba(255,255,255,.05); border:1px solid var(--border); border-radius:20px; padding:3px 10px; white-space:nowrap; }
.count-badge strong { color:var(--accent); }

/* ── States ──────────────────────────────────────────────────── */
#loading {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
}
.spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
#loading p { font-size:12px; color:var(--muted); }

#empty-state { display:none; flex:1; flex-direction:column; align-items:center; justify-content:center; gap:14px; }
#empty-state .icon { font-size:48px; animation:floatY 3s ease-in-out infinite; }
@keyframes floatY { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
#empty-state h2 { font-size:18px; font-weight:700; color:var(--accent); }
#empty-state p  { font-size:12px; color:var(--muted); text-align:center; }

/* ── Gallery ──────────────────────────────────────────────────── */
#gallery-wrap { display:none; flex:1; overflow:auto; background:#f0ece4; transition:background .25s; }
#gallery { display:flex; flex-wrap:wrap; align-items:flex-start; }

.gif-item { position:relative; cursor:pointer; overflow:hidden; flex-shrink:0; }
.gif-item img { display:block; width:100%; height:100%; object-fit:contain; image-rendering:pixelated; }
.gif-label {
  position:absolute; bottom:0; left:0; right:0;
  padding:3px 6px; font-size:9px; color:#222;
  background:rgba(255,255,255,.6); backdrop-filter:blur(4px);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  opacity:0; transition:opacity .15s;
}
.gif-item:hover .gif-label { opacity:1; }
.gif-del {
  position:absolute; top:4px; right:4px;
  width:20px; height:20px; border-radius:4px;
  background:rgba(255,0,77,.8); border:none; color:#fff;
  font-size:10px; cursor:pointer; opacity:0; transition:opacity .15s;
  display:flex; align-items:center; justify-content:center;
}
.gif-item:hover .gif-del { opacity:1; }
.gif-del:hover { background:var(--accent2); }

/* ── Upload modal ─────────────────────────────────────────────── */
#upload-modal {
  display:none; position:fixed; inset:0; z-index:200;
  background:rgba(0,0,0,.75); backdrop-filter:blur(8px);
  align-items:center; justify-content:center;
}
#upload-modal.open { display:flex; }
.modal-box {
  background:#0f1530; border:2px solid var(--accent); border-radius:16px;
  padding:32px 36px; width:360px; box-shadow:0 0 40px rgba(0,255,136,.2);
}
.modal-box h2 { font-size:16px; color:var(--accent); margin-bottom:20px; letter-spacing:.05em; }
.modal-box label { font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); display:block; margin-bottom:5px; }
.modal-box input[type="password"],
.modal-box input[type="file"] {
  width:100%; padding:9px 12px; background:#1a2040;
  border:1px solid rgba(0,255,136,.3); border-radius:8px;
  color:var(--text); font-size:13px; margin-bottom:16px; outline:none; font-family:inherit;
}
.modal-box input[type="file"] { padding:7px 10px; cursor:pointer; }
.modal-actions { display:flex; gap:10px; margin-top:4px; }
.modal-actions button { flex:1; padding:10px; border-radius:8px; font-size:12px; font-weight:700; cursor:pointer; transition:.15s; }
.btn-cancel { background:transparent; border:1px solid rgba(255,255,255,.12); color:var(--muted); }
.btn-cancel:hover { border-color:var(--accent2); color:var(--accent2); }
.btn-upload { background:var(--accent); border:none; color:#0a0e27; }
.btn-upload:hover { background:#00e077; }
.btn-upload:disabled { opacity:.5; cursor:not-allowed; }
.modal-msg { font-size:11px; margin-top:8px; display:none; }
.modal-msg.err { color:var(--accent2); }
.modal-msg.ok  { color:var(--accent); }

/* ── Lightbox ─────────────────────────────────────────────────── */
#lightbox { display:none; position:fixed; inset:0; z-index:300; background:rgba(0,0,0,.85); backdrop-filter:blur(10px); align-items:center; justify-content:center; flex-direction:column; gap:12px; }
#lightbox.open { display:flex; }
#lb-img { max-width:82vw; max-height:82vh; image-rendering:pixelated; border-radius:6px; box-shadow:0 0 60px rgba(0,0,0,.6); }
#lb-name { font-size:11px; color:var(--muted); }
.lb-close { position:absolute; top:18px; right:22px; font-size:26px; color:var(--muted); cursor:pointer; background:none; border:none; transition:.15s; }
.lb-close:hover { color:var(--accent); }
.lb-nav { position:absolute; top:50%; transform:translateY(-50%); font-size:34px; color:rgba(255,255,255,.4); cursor:pointer; background:none; border:none; transition:.15s; padding:0 14px; user-select:none; }
.lb-nav:hover { color:var(--accent); }
#lb-prev { left:0; }
#lb-next { right:0; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <span style="font-size:17px">🧱</span>
    <div>
      <div class="brand-name">PIXEL3D</div>
      <div class="brand-sub">Galeria · v2.1</div>
    </div>
  </div>

  <div class="sep"></div>

  <button class="hbtn" onclick="loadGIFs()">🔄 Atualizar</button>
  <button class="hbtn orange" onclick="openUpload()">➕ Adicionar GIFs</button>

  <div class="sep"></div>

  <div class="color-group">
    <span class="ctrl-label">Fundo</span>
    <input type="color" id="bg-picker" value="#f0ece4" oninput="setBG(this.value)">
    <div class="presets">
      <div class="swatch active" style="background:#f0ece4" onclick="setSwatch(this,'#f0ece4')" title="Areia"></div>
      <div class="swatch"        style="background:#ffffff" onclick="setSwatch(this,'#ffffff')" title="Branco"></div>
      <div class="swatch"        style="background:#f5f5f5" onclick="setSwatch(this,'#f5f5f5')" title="Cinza"></div>
      <div class="swatch"        style="background:#e8f4ec" onclick="setSwatch(this,'#e8f4ec')" title="Verde"></div>
      <div class="swatch"        style="background:#eaf0fb" onclick="setSwatch(this,'#eaf0fb')" title="Azul"></div>
      <div class="swatch"        style="background:#1a1a2e" onclick="setSwatch(this,'#1a1a2e')" title="Escuro"></div>
    </div>
  </div>

  <div class="sep"></div>

  <div class="size-group">
    <span class="ctrl-label">Tamanho</span>
    <input type="range" id="size-slider" min="80" max="400" value="200"
           style="width:88px;accent-color:var(--accent);cursor:pointer"
           oninput="setTileSize(this.value)">
  </div>

  <div class="count-badge" id="count-badge" style="display:none">
    <strong id="count-num">0</strong> GIFs
  </div>
</header>

<div id="loading"><div class="spinner"></div><p>A carregar galeria…</p></div>

<div id="empty-state">
  <div class="icon">🎞️</div>
  <h2>Galeria vazia</h2>
  <p id="empty-msg">Ainda não há GIFs na pasta.<br>Usa <strong style="color:#ffa300">➕ Adicionar GIFs</strong> para começar!</p>
</div>

<div id="gallery-wrap">
  <div id="gallery"></div>
</div>

<!-- Upload modal -->
<div id="upload-modal">
  <div class="modal-box">
    <h2>➕ Adicionar GIFs</h2>
    <label>Password</label>
    <input type="password" id="upload-pwd" placeholder="••••••••" autocomplete="off">
    <label>Ficheiros GIF</label>
    <input type="file" id="upload-files" accept=".gif,image/gif" multiple>
    <div class="modal-msg" id="modal-msg"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeUpload()">Cancelar</button>
      <button class="btn-upload" id="btn-do-upload" onclick="doUpload()">Enviar</button>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <button class="lb-close" onclick="closeLB()">✕</button>
  <button class="lb-nav" id="lb-prev" onclick="navLB(-1)">‹</button>
  <img id="lb-img" src="" alt="">
  <div id="lb-name"></div>
  <button class="lb-nav" id="lb-next" onclick="navLB(+1)">›</button>
</div>

<script>
let gifs = [], tileSize = 200, lbIdx = 0, currentBG = '#f0ece4';

window.addEventListener('load', loadGIFs);

// ── Load ───────────────────────────────────────────────────────
async function loadGIFs() {
    showState('loading');
    try {
        const res = await fetch('/api/gifs');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        gifs = data.gifs || [];
        if (!gifs.length) { showState('empty'); return; }
        renderGallery();
    } catch (err) {
        showState('empty');
        document.getElementById('empty-msg').innerHTML =
            `Não foi possível contactar o servidor.<br><small style="color:var(--muted)">${err.message}<br>Inicia com: <code style="color:var(--accent)">node server.js</code></small>`;
    }
}

function renderGallery() {
    const g = document.getElementById('gallery');
    g.innerHTML = '';
    gifs.forEach((gif, i) => {
        const item = document.createElement('div');
        item.className = 'gif-item';
        item.style.cssText = `width:${tileSize}px;height:${tileSize}px`;
        const label = gif.name.replace(/pixel3d_/i,'').replace(/\.gif$/i,'').replace(/_/g,' ');
        item.innerHTML = `
          <img src="${gif.url}" alt="${gif.name}" loading="lazy">
          <div class="gif-label">${label}</div>
          <button class="gif-del" title="Apagar" onclick="deleteGIF(event,'${gif.name}')">✕</button>
        `;
        item.querySelector('img').addEventListener('click', () => openLB(i));
        g.appendChild(item);
    });
    showState('gallery');
    document.getElementById('count-badge').style.display = '';
    document.getElementById('count-num').textContent = gifs.length;
}

function showState(s) {
    document.getElementById('loading').style.display      = s==='loading' ? 'flex'  : 'none';
    document.getElementById('empty-state').style.display  = s==='empty'   ? 'flex'  : 'none';
    document.getElementById('gallery-wrap').style.display = s==='gallery'  ? 'block' : 'none';
    if (s !== 'gallery') document.getElementById('count-badge').style.display = 'none';
}

// ── Tile size ──────────────────────────────────────────────────
function setTileSize(v) {
    tileSize = parseInt(v);
    document.querySelectorAll('.gif-item').forEach(el => {
        el.style.width = el.style.height = tileSize + 'px';
    });
}

// ── Background ─────────────────────────────────────────────────
function setBG(hex) {
    currentBG = hex;
    document.getElementById('gallery-wrap').style.background = hex;
    document.getElementById('bg-picker').value = hex;
    if (document.getElementById('lb-img').src) document.getElementById('lb-img').style.background = hex;
    document.querySelectorAll('.swatch').forEach(s =>
        s.classList.toggle('active', s.getAttribute('onclick').includes(`'${hex}'`))
    );
}
function setSwatch(el, hex) { setBG(hex); }

// ── Upload ─────────────────────────────────────────────────────
function openUpload() {
    const m = document.getElementById('modal-msg');
    m.style.display = 'none'; m.className = 'modal-msg';
    document.getElementById('upload-pwd').value = '';
    document.getElementById('upload-files').value = '';
    document.getElementById('btn-do-upload').disabled = false;
    document.getElementById('btn-do-upload').textContent = 'Enviar';
    document.getElementById('upload-modal').classList.add('open');
    setTimeout(() => document.getElementById('upload-pwd').focus(), 80);
}
function closeUpload() { document.getElementById('upload-modal').classList.remove('open'); }

async function doUpload() {
    const pwd   = document.getElementById('upload-pwd').value;
    const files = document.getElementById('upload-files').files;
    const msgEl = document.getElementById('modal-msg');
    const btn   = document.getElementById('btn-do-upload');

    const showMsg = (txt, type) => {
        msgEl.textContent = txt;
        msgEl.className = 'modal-msg ' + type;
        msgEl.style.display = 'block';
    };

    if (!pwd)          { showMsg('Insere a password.', 'err'); return; }
    if (!files.length) { showMsg('Seleciona pelo menos um ficheiro GIF.', 'err'); return; }

    btn.disabled = true; btn.textContent = 'A enviar…';
    showMsg(`A enviar ${files.length} ficheiro(s)…`, 'ok');

    const form = new FormData();
    for (const f of files) form.append('gifs', f);

    try {
        const res = await fetch('/api/upload', {
            method: 'POST',
            headers: { 'x-upload-password': pwd },
            body: form
        });
        const data = await res.json();
        if (!res.ok) { showMsg(data.error || 'Erro no upload.', 'err'); btn.disabled=false; btn.textContent='Enviar'; return; }
        showMsg(`✓ ${data.count} GIF(s) adicionado(s)!`, 'ok');
        setTimeout(() => { closeUpload(); loadGIFs(); }, 900);
    } catch (err) {
        showMsg('Erro de rede: ' + err.message, 'err');
        btn.disabled = false; btn.textContent = 'Enviar';
    }
}

// ── Delete ─────────────────────────────────────────────────────
async function deleteGIF(e, name) {
    e.stopPropagation();
    const pwd = prompt(`Password para apagar "${name}":`);
    if (!pwd) return;
    if (!confirm(`Confirmas apagar "${name}"?`)) return;
    try {
        const res = await fetch(`/api/gifs/${encodeURIComponent(name)}`, {
            method:'DELETE', headers:{'x-upload-password': pwd}
        });
        const data = await res.json();
        if (!res.ok) { alert(data.error || 'Erro.'); return; }
        loadGIFs();
    } catch(err) { alert('Erro: ' + err.message); }
}

// ── Lightbox ───────────────────────────────────────────────────
function openLB(i) { lbIdx=i; updateLB(); document.getElementById('lightbox').classList.add('open'); }
function updateLB() {
    const g = gifs[lbIdx];
    document.getElementById('lb-img').src = g.url;
    document.getElementById('lb-img').style.background = currentBG;
    document.getElementById('lb-name').textContent = g.name.replace(/pixel3d_/i,'');
    document.getElementById('lb-prev').style.opacity = lbIdx===0 ? '.2':'1';
    document.getElementById('lb-next').style.opacity = lbIdx===gifs.length-1 ? '.2':'1';
}
function closeLB() { document.getElementById('lightbox').classList.remove('open'); }
function navLB(d) { lbIdx=Math.max(0,Math.min(gifs.length-1,lbIdx+d)); updateLB(); }

document.addEventListener('keydown', e => {
    if (document.getElementById('lightbox').classList.contains('open')) {
        if (e.key==='ArrowLeft') navLB(-1);
        if (e.key==='ArrowRight') navLB(+1);
        if (e.key==='Escape') closeLB();
    }
    if (e.key==='Escape') closeUpload();
});
document.getElementById('lightbox').addEventListener('click', e => { if(e.target.id==='lightbox') closeLB(); });
document.getElementById('upload-modal').addEventListener('click', e => { if(e.target.id==='upload-modal') closeUpload(); });

document.getElementById('gallery-wrap').style.background = currentBG;
</script>
</body>
</html>
