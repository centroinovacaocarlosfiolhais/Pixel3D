<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel3D — Visualizador de Camadas</title>
<style>
/* ── Reset & Vars ──────────────────────────────────────────── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:      #0a0e27;
  --bg2:     #0d1235;
  --panel:   rgba(13,18,53,0.96);
  --accent:  #00ff88;
  --accent2: #ff004d;
  --accent3: #29adff;
  --yellow:  #ffec27;
  --text:    #e0e7ff;
  --muted:   #5a6880;
  --border:  rgba(0,255,136,0.18);
  --mono:    'Courier New', 'Lucida Console', monospace;
}

body {
  font-family: 'Segoe UI', Tahoma, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Header ────────────────────────────────────────────────── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 28px;
  border-bottom: 1px solid var(--border);
  background: var(--panel);
  backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 50;
}
.brand { display:flex; align-items:center; gap:10px; }
.brand-name {
  font-size: 18px; font-weight: 800; letter-spacing: .07em;
  color: var(--accent); text-shadow: 0 0 14px rgba(0,255,136,.4);
}
.brand-sub { font-size: 9px; color: var(--muted); letter-spacing:.1em; text-transform:uppercase; }
.header-badge {
  font-size: 9px; letter-spacing:.1em; text-transform:uppercase;
  color: var(--muted); background: rgba(0,255,136,.06);
  border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px;
}

/* ── Drop zone ─────────────────────────────────────────────── */
#drop-zone {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 60px 20px;
  cursor: pointer;
  transition: background .2s;
}
#drop-zone.drag-over { background: rgba(0,255,136,.04); }
#drop-zone .drop-icon {
  font-size: 56px;
  filter: drop-shadow(0 0 20px rgba(0,255,136,.3));
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-8px); }
}
#drop-zone h2 {
  font-size: 22px; font-weight: 700; color: var(--accent);
  text-shadow: 0 0 20px rgba(0,255,136,.3);
}
#drop-zone p { font-size: 13px; color: var(--muted); }
.drop-hint {
  display: flex; align-items:center; gap:8px;
  font-size:11px; color: var(--muted);
  border: 1px dashed rgba(0,255,136,.3); border-radius: 8px; padding: 8px 20px;
}
.drop-hint kbd {
  background: rgba(0,255,136,.1); border: 1px solid var(--border);
  border-radius:4px; padding: 2px 7px; font-size:11px; color:var(--accent);
  font-family: var(--mono);
}
#file-input { display:none; }

/* ── Viewer layout ─────────────────────────────────────────── */
#viewer { display:none; flex:1; flex-direction:column; gap:0; }
#viewer.active { display:flex; }

/* ── Stats bar ─────────────────────────────────────────────── */
#stats-bar {
  display: flex; align-items:center; gap:16px; flex-wrap:wrap;
  padding: 10px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  font-size: 11px;
}
.stat { display:flex; align-items:center; gap:5px; color: var(--muted); }
.stat strong { color: var(--accent); font-variant-numeric: tabular-nums; }
.stat-sep { color: var(--border); }
.reload-btn {
  margin-left:auto; padding: 5px 14px; border-radius:6px;
  border: 1px solid var(--border); background: transparent;
  color: var(--muted); font-size:11px; cursor:pointer; transition:.15s;
}
.reload-btn:hover { border-color: var(--accent2); color: var(--accent2); }

/* ── Main content ──────────────────────────────────────────── */
#main-content {
  flex:1; display:flex; gap:0; overflow:hidden;
}

/* ── Layer nav sidebar ─────────────────────────────────────── */
#layer-nav {
  width: 100px; min-width:100px;
  border-right: 1px solid var(--border);
  overflow-y: auto; background: var(--bg2);
  padding: 10px 8px;
  display: flex; flex-direction:column; gap:4px;
}
#layer-nav::-webkit-scrollbar { width:4px; }
#layer-nav::-webkit-scrollbar-thumb { background: var(--accent); border-radius:2px; }
.layer-btn {
  padding: 7px 6px; border-radius:6px;
  border: 1px solid transparent; background:transparent;
  color: var(--muted); font-size:11px; font-weight:600;
  cursor:pointer; transition:.15s; text-align:center;
  font-family: var(--mono);
}
.layer-btn:hover { border-color: var(--border); color: var(--text); }
.layer-btn.active {
  background: rgba(0,255,136,.12); border-color: var(--accent);
  color: var(--accent); text-shadow: 0 0 8px rgba(0,255,136,.4);
}
.layer-nav-label {
  font-size: 8px; letter-spacing:.12em; text-transform:uppercase;
  color: var(--muted); text-align:center; padding: 4px 0 6px;
  border-bottom: 1px solid var(--border); margin-bottom:4px;
}

/* ── Grid area ─────────────────────────────────────────────── */
#grid-area {
  flex:1; overflow:auto; padding: 24px;
  display:flex; flex-direction:column; align-items:center; gap:16px;
}

/* ── Layer section ─────────────────────────────────────────── */
.layer-section { width:100%; max-width: 700px; }
.layer-header {
  display: flex; align-items:center; gap:10px;
  margin-bottom: 10px;
}
.layer-tag {
  font-size: 11px; font-weight:800; letter-spacing:.1em;
  color: var(--accent3); font-family: var(--mono);
  background: rgba(41,173,255,.1); border: 1px solid rgba(41,173,255,.3);
  border-radius:5px; padding: 3px 10px;
}
.layer-line {
  flex:1; height:1px;
  background: linear-gradient(to right, rgba(41,173,255,.3), transparent);
}
.layer-count {
  font-size: 9px; color: var(--muted); font-family: var(--mono);
  letter-spacing: .05em;
}

/* ── The grid itself ───────────────────────────────────────── */
.pixel-grid {
  display: inline-grid;
  gap: 2px;
  background: rgba(255,255,255,.03);
  border: 1px solid rgba(255,255,255,.06);
  border-radius: 8px;
  padding: 10px;
}
.px {
  width: 22px; height: 22px;
  border-radius: 3px;
  display: flex; align-items:center; justify-content:center;
  font-size: 8px; font-weight:700; font-family: var(--mono);
  cursor: default;
  transition: transform .1s, box-shadow .1s;
  position: relative;
}
.px.empty {
  background: rgba(255,255,255,.03);
  color: transparent;
}
.px:not(.empty):hover {
  transform: scale(1.35);
  z-index: 10;
  box-shadow: 0 0 12px rgba(255,255,255,.3);
}
.px:not(.empty)::after {
  content: attr(data-tip);
  position:absolute; bottom:calc(100% + 5px); left:50%;
  transform: translateX(-50%);
  background: rgba(10,14,39,.95); border: 1px solid var(--border);
  border-radius:5px; padding: 3px 8px; font-size:9px;
  color: var(--text); white-space:nowrap; pointer-events:none;
  opacity:0; transition: opacity .15s;
  font-family: 'Segoe UI', sans-serif; font-weight:500; letter-spacing:.03em;
}
.px:not(.empty):hover::after { opacity:1; }

/* ── Legend ────────────────────────────────────────────────── */
#legend {
  width: 200px; min-width:200px;
  border-left: 1px solid var(--border);
  background: var(--bg2); padding:14px 12px;
  overflow-y:auto;
  display:flex; flex-direction:column; gap:12px;
}
#legend::-webkit-scrollbar { width:4px; }
#legend::-webkit-scrollbar-thumb { background: var(--accent); border-radius:2px; }
.legend-title {
  font-size:8px; letter-spacing:.12em; text-transform:uppercase;
  color: var(--muted); border-bottom:1px solid var(--border); padding-bottom:7px;
}
.legend-item {
  display:flex; align-items:center; gap:8px;
  font-size:11px; color: var(--muted);
  opacity: .4; transition: opacity .2s;
}
.legend-item.used { opacity: 1; color: var(--text); }
.legend-swatch {
  width:18px; height:18px; border-radius:4px; flex-shrink:0;
  border: 1px solid rgba(255,255,255,.1);
}
.legend-sym {
  font-family: var(--mono); font-size:10px; font-weight:700;
  color: var(--accent); background: rgba(0,255,136,.1);
  border: 1px solid var(--border); border-radius:3px;
  width:18px; height:18px; display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.legend-name { font-size:10px; }

/* ── Single-layer mode header ──────────────────────────────── */
#single-header {
  display:none; align-items:center; gap:12px;
  padding: 12px 24px; border-bottom: 1px solid var(--border);
  background: var(--bg2);
}
#single-header.active { display:flex; }
.nav-arrow {
  width:32px; height:32px; border-radius:6px;
  border:1px solid var(--border); background:transparent;
  color:var(--accent); font-size:16px; cursor:pointer; transition:.15s;
  display:flex;align-items:center;justify-content:center;
}
.nav-arrow:hover { background:rgba(0,255,136,.1); }
.nav-arrow:disabled { opacity:.25; cursor:not-allowed; }
.nav-info { font-size:13px; font-weight:700; color:var(--accent); font-family:var(--mono); }
.nav-total { font-size:10px; color:var(--muted); }
.view-toggle {
  margin-left:auto; display:flex; gap:6px;
}
.vtbtn {
  padding:5px 12px; border-radius:6px; font-size:11px; cursor:pointer;
  border:1px solid var(--border); background:transparent; color:var(--muted); transition:.15s;
}
.vtbtn.active { background:rgba(0,255,136,.12); border-color:var(--accent); color:var(--accent); }

/* ── Raw text panel ────────────────────────────────────────── */
#raw-panel {
  display:none; flex:1; padding:24px; overflow:auto;
}
#raw-panel.active { display:block; }
#raw-text {
  font-family: var(--mono); font-size:13px; line-height:1.85;
  color: var(--muted); white-space:pre;
}
#raw-text .sym-colored { font-weight:700; }
#raw-text .layer-head  { color: var(--accent3); font-weight:700; }
#raw-text .meta-line   { color: rgba(0,255,136,.5); }
</style>
</head>
<body>

<header>
  <div class="brand">
    <span style="font-size:20px">🧱</span>
    <div>
      <div class="brand-name">PIXEL3D</div>
      <div class="brand-sub">Visualizador de Camadas</div>
    </div>
  </div>
  <div class="header-badge">Clube de Código · CICF</div>
</header>

<!-- Drop zone -->
<div id="drop-zone">
  <div class="drop-icon">📄</div>
  <h2>Arrasta o ficheiro .TXT aqui</h2>
  <p>ou clica para escolher o ficheiro</p>
  <div class="drop-hint">
    <span>Exporta do Pixel3D com</span>
    <kbd>📄 TXT</kbd>
    <span>e carrega aqui</span>
  </div>
  <input type="file" id="file-input" accept=".txt">
</div>

<!-- Viewer (hidden until file loaded) -->
<div id="viewer">

  <!-- Stats bar -->
  <div id="stats-bar">
    <div class="stat">Modelo: <strong id="s-name">—</strong></div>
    <div class="stat-sep">·</div>
    <div class="stat">Blocos: <strong id="s-blocks">—</strong></div>
    <div class="stat-sep">·</div>
    <div class="stat">Camadas: <strong id="s-layers">—</strong></div>
    <div class="stat-sep">·</div>
    <div class="stat">Cores: <strong id="s-colors">—</strong></div>
    <button class="reload-btn" onclick="resetViewer()">↩ Carregar outro</button>
  </div>

  <!-- Single-layer nav header -->
  <div id="single-header">
    <button class="nav-arrow" id="nav-prev" onclick="navLayer(-1)">‹</button>
    <div>
      <div class="nav-info" id="nav-label">Y=0</div>
      <div class="nav-total" id="nav-total"></div>
    </div>
    <button class="nav-arrow" id="nav-next" onclick="navLayer(+1)">›</button>
    <div class="view-toggle">
      <button class="vtbtn active" id="vt-color" onclick="setView('color')">🎨 Cores</button>
      <button class="vtbtn" id="vt-raw"   onclick="setView('raw')">📝 Texto</button>
    </div>
  </div>

  <!-- Main content -->
  <div id="main-content">

    <!-- Layer nav -->
    <div id="layer-nav">
      <div class="layer-nav-label">Camadas</div>
      <div id="layer-btn-list"></div>
    </div>

    <!-- Grid area (color view) -->
    <div id="grid-area"></div>

    <!-- Raw text panel -->
    <div id="raw-panel">
      <pre id="raw-text"></pre>
    </div>

    <!-- Legend -->
    <div id="legend">
      <div class="legend-title">Paleta PICO-8</div>
      <div id="legend-items"></div>
    </div>

  </div>
</div>

<script>
// ── Paleta PICO-8 ───────────────────────────────────────────────
const PALETTE = [
  { sym:'·', hex:'#000000', name:'Preto'    },
  { sym:'N', hex:'#1D2B53', name:'Marinho'  },
  { sym:'P', hex:'#7E2553', name:'Bordô'    },
  { sym:'V', hex:'#008751', name:'Verde'    },
  { sym:'C', hex:'#AB5236', name:'Castanho' },
  { sym:'Z', hex:'#5F574F', name:'Cinza'    },
  { sym:'S', hex:'#C2C3C7', name:'Prata'    },
  { sym:'B', hex:'#FFF1E8', name:'Branco'   },
  { sym:'R', hex:'#FF004D', name:'Vermelho' },
  { sym:'L', hex:'#FFA300', name:'Laranja'  },
  { sym:'A', hex:'#FFEC27', name:'Amarelo'  },
  { sym:'M', hex:'#00E436', name:'Lima'     },
  { sym:'U', hex:'#29ADFF', name:'Azul'     },
  { sym:'I', hex:'#83769C', name:'Lilás'    },
  { sym:'O', hex:'#FF77A8', name:'Rosa'     },
  { sym:'E', hex:'#FFCCAA', name:'Pêssego'  },
];
// Map: char → palette entry
const SYM_MAP = {};
PALETTE.forEach(p => { SYM_MAP[p.sym] = p; });

// ── State ───────────────────────────────────────────────────────
let layers = [];       // [ { y, rows: [[char, char, ...], ...] } ]
let currentLayerIdx = 0;
let currentView = 'color';
let rawContent = '';

// ── Drop / file input ───────────────────────────────────────────
const dropZone   = document.getElementById('drop-zone');
const fileInput  = document.getElementById('file-input');

dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => {
  if (e.target.files[0]) readFile(e.target.files[0]);
});
dropZone.addEventListener('dragover', e => {
  e.preventDefault(); dropZone.classList.add('drag-over');
});
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.name.endsWith('.txt')) readFile(f);
});

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (!layers.length) return;
  if (e.key === 'ArrowUp'   || e.key === 'ArrowRight') navLayer(+1);
  if (e.key === 'ArrowDown' || e.key === 'ArrowLeft')  navLayer(-1);
});

function readFile(file) {
  const reader = new FileReader();
  reader.onload = e => parseTXT(e.target.result, file.name);
  reader.readAsText(file);
}

// ── Parser ──────────────────────────────────────────────────────
function parseTXT(text, filename) {
  rawContent = text;
  layers = [];

  const lines = text.split('\n');
  let current = null;
  let blocksMeta = null, gridMeta = null;

  for (const line of lines) {
    // Metadata
    const bm = line.match(/Blocos\s*:\s*(\d+)/);
    if (bm) blocksMeta = bm[1];
    const gm = line.match(/Grid\s*:\s*([\d×x]+)/);
    if (gm) gridMeta = gm[1];

    // Layer header: ━━━ Y=N ━━━
    const lm = line.match(/Y=(\d+)/);
    if (lm && line.includes('━')) {
      current = { y: parseInt(lm[1]), rows: [] };
      layers.push(current);
      continue;
    }

    // Data row: two leading spaces then chars separated by spaces
    if (current && line.startsWith('  ') && line.trim().length > 0) {
      const chars = line.trim().split(' ').map(c => c || '·');
      if (chars.length > 1) current.rows.push(chars);
    }
  }

  if (!layers.length) {
    alert('Ficheiro não reconhecido. Exporta do Pixel3D com o botão 📄 TXT.');
    return;
  }

  // Stats
  const nameClean = filename.replace(/\.txt$/i,'').replace(/pixel3d_/i,'').replace(/_/g,' ');
  document.getElementById('s-name').textContent = nameClean || '—';
  document.getElementById('s-blocks').textContent = blocksMeta || countBlocks();
  document.getElementById('s-layers').textContent = layers.length;
  document.getElementById('s-colors').textContent = countColors();

  buildLegend();
  buildLayerNav();
  currentLayerIdx = 0;
  showLayer(0);
  renderRaw();

  dropZone.style.display = 'none';
  document.getElementById('viewer').classList.add('active');
  document.getElementById('single-header').classList.add('active');
}

function countBlocks() {
  let n = 0;
  layers.forEach(l => l.rows.forEach(r => r.forEach(c => { if (c !== '·') n++; })));
  return n;
}

function countColors() {
  const set = new Set();
  layers.forEach(l => l.rows.forEach(r => r.forEach(c => { if (c !== '·') set.add(c); })));
  return set.size;
}

// ── Legend ──────────────────────────────────────────────────────
function buildLegend() {
  const usedSyms = new Set();
  layers.forEach(l => l.rows.forEach(r => r.forEach(c => { if (c !== '·') usedSyms.add(c); })));

  const container = document.getElementById('legend-items');
  container.innerHTML = '';
  PALETTE.slice(1).forEach(p => {  // skip '·' (empty)
    const used = usedSyms.has(p.sym);
    const div = document.createElement('div');
    div.className = 'legend-item' + (used ? ' used' : '');
    div.innerHTML = `
      <div class="legend-swatch" style="background:${p.hex}"></div>
      <div class="legend-sym">${p.sym}</div>
      <div class="legend-name">${p.name}</div>
    `;
    container.appendChild(div);
  });
}

// ── Layer nav buttons ───────────────────────────────────────────
function buildLayerNav() {
  const list = document.getElementById('layer-btn-list');
  list.innerHTML = '';
  layers.forEach((l, i) => {
    const btn = document.createElement('button');
    btn.className = 'layer-btn';
    btn.textContent = `Y=${l.y}`;
    btn.onclick = () => showLayer(i);
    btn.id = `lbtn-${i}`;
    list.appendChild(btn);
  });
}

// ── Show layer ──────────────────────────────────────────────────
function showLayer(idx) {
  currentLayerIdx = Math.max(0, Math.min(layers.length - 1, idx));
  const layer = layers[currentLayerIdx];

  // Update nav buttons
  document.querySelectorAll('.layer-btn').forEach((b, i) => {
    b.classList.toggle('active', i === currentLayerIdx);
  });
  // Scroll active button into view
  const ab = document.getElementById(`lbtn-${currentLayerIdx}`);
  if (ab) ab.scrollIntoView({ block:'nearest' });

  // Update header
  document.getElementById('nav-label').textContent = `Y = ${layer.y}`;
  document.getElementById('nav-total').textContent = `Camada ${currentLayerIdx + 1} de ${layers.length}`;
  document.getElementById('nav-prev').disabled = (currentLayerIdx === 0);
  document.getElementById('nav-next').disabled = (currentLayerIdx === layers.length - 1);

  if (currentView === 'color') renderColorGrid(layer);
}

function navLayer(delta) {
  showLayer(currentLayerIdx + delta);
}

// ── Color grid renderer ─────────────────────────────────────────
function renderColorGrid(layer) {
  const area = document.getElementById('grid-area');
  area.innerHTML = '';

  const section = document.createElement('div');
  section.className = 'layer-section';

  // Count non-empty cells
  let cellCount = 0;
  layer.rows.forEach(r => r.forEach(c => { if (c !== '·') cellCount++; }));

  section.innerHTML = `
    <div class="layer-header">
      <span class="layer-tag">Y = ${layer.y}</span>
      <div class="layer-line"></div>
      <span class="layer-count">${cellCount} bloco${cellCount !== 1 ? 's' : ''}</span>
    </div>
  `;

  const cols = Math.max(...layer.rows.map(r => r.length));
  const grid = document.createElement('div');
  grid.className = 'pixel-grid';
  grid.style.gridTemplateColumns = `repeat(${cols}, 22px)`;

  layer.rows.forEach((row, zi) => {
    for (let xi = 0; xi < cols; xi++) {
      const sym = row[xi] || '·';
      const cell = document.createElement('div');
      cell.className = 'px';

      if (sym === '·') {
        cell.classList.add('empty');
      } else {
        const pal = SYM_MAP[sym];
        if (pal) {
          cell.style.background = pal.hex;
          // Dark text on light colours, white on dark
          const r = parseInt(pal.hex.slice(1,3),16);
          const g = parseInt(pal.hex.slice(3,5),16);
          const b = parseInt(pal.hex.slice(5,7),16);
          const lum = (r*299 + g*587 + b*114) / 1000;
          cell.style.color = lum > 140 ? '#000' : '#fff';
          cell.textContent = sym;
          cell.setAttribute('data-tip', `${pal.name} (${sym}) — x=${xi} z=${zi}`);
          // Subtle inner shadow
          cell.style.boxShadow = `inset 0 -2px 0 rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.15)`;
        } else {
          cell.textContent = sym;
          cell.style.background = '#444';
        }
      }
      grid.appendChild(cell);
    }
  });

  section.appendChild(grid);
  area.appendChild(section);
}

// ── Raw text renderer ───────────────────────────────────────────
function renderRaw() {
  const pre = document.getElementById('raw-text');
  let html = '';
  const lines = rawContent.split('\n');

  lines.forEach(line => {
    if (line.includes('Y=') && line.includes('━')) {
      html += `<span class="layer-head">${escHtml(line)}</span>\n`;
    } else if (line.match(/^[═━]/)) {
      html += `<span class="meta-line">${escHtml(line)}</span>\n`;
    } else if (line.trim().startsWith('Blocos') || line.trim().startsWith('Grid')) {
      html += `<span class="meta-line">${escHtml(line)}</span>\n`;
    } else {
      // Colorise each symbol character
      let out = '';
      for (const ch of line) {
        if (SYM_MAP[ch] && ch !== '·') {
          const pal = SYM_MAP[ch];
          out += `<span class="sym-colored" style="color:${pal.hex};text-shadow:0 0 6px ${pal.hex}88">${escHtml(ch)}</span>`;
        } else {
          out += escHtml(ch);
        }
      }
      html += out + '\n';
    }
  });

  pre.innerHTML = html;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── View toggle ─────────────────────────────────────────────────
function setView(v) {
  currentView = v;
  document.getElementById('vt-color').classList.toggle('active', v==='color');
  document.getElementById('vt-raw').classList.toggle('active', v==='raw');
  document.getElementById('grid-area').style.display  = v==='color' ? 'flex' : 'none';
  document.getElementById('raw-panel').classList.toggle('active', v==='raw');
  document.getElementById('layer-nav').style.display  = v==='color' ? '' : 'none';
  document.getElementById('legend').style.display     = v==='color' ? '' : 'none';
  if (v === 'color') showLayer(currentLayerIdx);
}

// ── Reset ───────────────────────────────────────────────────────
function resetViewer() {
  layers = []; rawContent = '';
  document.getElementById('viewer').classList.remove('active');
  document.getElementById('single-header').classList.remove('active');
  dropZone.style.display = 'flex';
  fileInput.value = '';
  setView('color');
}
</script>
